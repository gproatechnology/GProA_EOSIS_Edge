# Render CLI configuration
# Run: render login && render init

services:
  # Backend service configuration reference
  backend:
    type: web
    name: gproa-edge-backend
    env: python
    region: oregon
    buildCommand: cd backend && pip install -r requirements.txt
    startCommand: cd backend && uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MONGO_URL
        sync: false  # Secret, not synced from local
      - key: EMERGENT_LLM_KEY
        sync: false
      - key: DB_NAME
        value: gproa_edge
      - key: CORS_ORIGINS
        value: "*"
  
  # Frontend service configuration reference
  frontend:
    type: web
    name: gproa-edge-frontend
    env: node
    region: oregon
    buildCommand: cd frontend && npm install && npm run build
    startCommand: npx serve -s build -l $PORT
    envVars:
      - key: REACT_APP_BACKEND_URL
        fromService:
          name: gproa-edge-backend
          type: web
          property: host
