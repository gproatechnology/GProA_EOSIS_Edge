version: '3.8'

services:
  # ============================================
  # BACKEND - FastAPI + SQLite + Mock AI
  # ============================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gproa-edge-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      # Database: SQLite (no MongoDB needed for demo)
      - MONGO_URL=${MONGO_URL:-}
      - DB_NAME=${DB_NAME:-gproa_edge}
      - DEMO_MODE=${DEMO_MODE:-true}
      # OpenAI: Leave empty for mock mode
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      # CORS
      - CORS_ORIGINS=${CORS_ORIGINS:-*}
    volumes:
      # Persist SQLite data on host (optional)
      - ./backend/data:/app/data
      # For development (hot reload)
      - ./backend:/app
    working_dir: /app
    command: uvicorn server:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - gproa-network

  # ============================================
  # FRONTEND - React + Nginx
  # ============================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Pass backend URL as build arg for React
        - REACT_APP_BACKEND_URL=${REACT_APP_BACKEND_URL:-http://localhost:8000}
    container_name: gproa-edge-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - gproa-network

  # ============================================
  # OPTIONAL: Nginx Reverse Proxy (Production)
  # ============================================
  # Uncomment to use single entrypoint with Nginx
  # nginx:
  #   image: nginx:alpine
  #   container_name: gproa-edge-nginx
  #   restart: unless-stopped
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
  #     - ./frontend/build:/usr/share/nginx/html:ro
  #   depends_on:
  #     - backend
  #   networks:
  #     - gproa-network

networks:
  gproa-network:
    driver: bridge
