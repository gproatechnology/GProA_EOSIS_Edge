# Render Blueprint for GProA EDGE (submain branch)
# Deploy as a single unified web service (Monolith) in DEMO MODE
# FastAPI serves the React frontend

services:
  # === UNIFIED SERVICE (FastAPI + React SPA) ===
  - type: web
    name: gproa-edge-monolith
    env: python
    region: oregon
    # First build the React app, then install Python requirements
    buildCommand: cd frontend && yarn install && CI=false yarn build && cd ../backend && pip install -r requirements.txt
    startCommand: cd backend && uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      # Database: Leave empty to use SQLite (demo mode)
      - key: MONGO_URL
        sync: false
        # IMPORTANT: Do NOT set this value to use SQLite fallback
      
      # OpenAI: Leave empty to use mock AI responses (demo mode)
      - key: OPENAI_API_KEY
        sync: false
        # IMPORTANT: Do NOT set this value to use mock responses
      
      # Optional: Force demo mode explicitly (default: true when no API key)
      - key: DEMO_MODE
        value: "true"
      
      # Database file name (SQLite will create ./data/gproa_edge.db)
      - key: DB_NAME
        value: gproa_edge
      
      # CORS: Allow all origins in demo, restrict in production
      - key: CORS_ORIGINS
        value: "*"