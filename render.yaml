# Render Blueprint for GProA EDGE
# Deploy both backend and frontend services

services:
  # === BACKEND SERVICE ===
  - type: web
    name: gproa-edge-backend
    env: python
    region: oregon
    buildCommand: cd backend && pip install -r requirements.txt
    startCommand: cd backend && uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MONGO_URL
        sync: false
      - key: EMERGENT_LLM_KEY
        sync: false
      - key: DB_NAME
        sync: false
      - key: CORS_ORIGINS
        value: "*"
      - key: FRONTEND_URL
        fromService:
          name: gproa-edge-frontend
          type: web
          property: url
    plan: free
    autoDeploy: true

  # === FRONTEND SERVICE ===
  - type: web
    name: gproa-edge-frontend
    env: node
    region: oregon
    buildCommand: cd frontend && npm install && npm run build
    startCommand: npx serve -s build -l $PORT
    envVars:
      - key: REACT_APP_API_URL
        fromService:
          name: gproa-edge-backend
          type: web
          property: url
    plan: free
    autoDeploy: true